name: iOS Simulator

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select an available iOS Simulator
        id: simulator
        run: |
          SIMULATOR_ID=$(python3 - <<'PY'
          import json, subprocess, sys

          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"]))
          for runtime_name, devices in data.get("devices", {}).items():
              if "iOS" not in runtime_name:
                  continue
              for device in devices:
                  name = device.get("name", "")
                  if "iPhone" in name and device.get("isAvailable"):
                      print(device["udid"])
                      sys.exit(0)
          sys.exit("No available iPhone simulator found")
          PY
          )
          echo "simulator_id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"
      - name: Build and test on iOS simulator
        run: |
          xcodebuild \
            -project Kukulcan.xcodeproj \
            -scheme Kukulcan \
            -destination 'id=${{ steps.simulator.outputs.simulator_id }}' \
            build test
